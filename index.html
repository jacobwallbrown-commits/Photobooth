<script>
"use strict";

const { useState, useRef, useCallback, useEffect, createElement: h } = React;

// ─── CONSTANTS ───────────────────────────────────────────────────────
const STEPS = {
  HOME: "home", TRIAL: "trial", REPS: "reps", TREATMENTS: "treatments",
  SELECT_REPS: "selectReps", FRONT_BACK: "frontBack", DIRECTIONS: "directions",
  ARM_IMPORT: "armImport", SAVE_SETUP: "saveSetup", SHOOTING: "shooting",
  REVIEW: "review", COMPLETE: "complete",
};

// ─── HELPERS ─────────────────────────────────────────────────────────
function detectSaveCapabilities() {
  var hasFileSystemAccess = "showDirectoryPicker" in window;
  var hasShareFiles = false;
  try {
    hasShareFiles = "share" in navigator && "canShare" in navigator &&
      navigator.canShare({ files: [new File([""], "t.jpg", { type: "image/jpeg" })] });
  } catch(e) {}
  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
    (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
  return { hasFileSystemAccess: hasFileSystemAccess, hasShareFiles: hasShareFiles, isIOS: isIOS };
}

function parseARMText(text) {
  var mapping = {};
  var lines = text.replace(/\r/g, "").replace(/\n+/g, "\n").split("\n");
  for (var i = 0; i < lines.length; i++) {
    var trimmed = lines[i].trim();
    var trtMatch = trimmed.match(/^(\d{1,2})\s+/);
    if (!trtMatch) continue;
    var trtNum = parseInt(trtMatch[1]);
    if (trtNum < 1 || trtNum > 99) continue;
    var plotMatches = trimmed.match(/\b[1-9]\d{2}\b/g);
    if (!plotMatches || plotMatches.length < 2) continue;
    for (var j = 0; j < plotMatches.length; j++) {
      var plotNum = parseInt(plotMatches[j]);
      if (plotNum >= 100 && plotNum <= 999) mapping[plotNum] = trtNum;
    }
  }
  return mapping;
}

function parseManualEntry(text) {
  var mapping = {};
  var pairRegex = /(\d{3})\s*[=:→\-\>]+\s*(\d{1,2})/g;
  var m;
  while ((m = pairRegex.exec(text)) !== null) {
    mapping[parseInt(m[1])] = parseInt(m[2]);
  }
  if (Object.keys(mapping).length > 0) return mapping;
  var lines = text.trim().split("\n");
  for (var i = 0; i < lines.length; i++) {
    var parts = lines[i].trim().split(/\s+/);
    if (parts.length >= 2) {
      var plot = parseInt(parts[0]), trt = parseInt(parts[1]);
      if (plot >= 100 && plot <= 999 && trt >= 1 && trt <= 99) mapping[plot] = trt;
    }
  }
  return mapping;
}

function buildShootingQueue(config) {
  var queue = [];
  var tn = config.trialNumber, sr = config.selectedReps, tt = config.totalTreatments;
  var nfb = config.needFrontBack, dirs = config.directions, ptm = config.plotTreatmentMap;
  for (var i = 0; i < sr.length; i++) {
    var repNum = sr[i], dir = dirs[repNum], repBase = repNum * 100;
    var plots = [];
    if (dir === "asc") { for (var t = 1; t <= tt; t++) plots.push(repBase + t); }
    else { for (var t = tt; t >= 1; t--) plots.push(repBase + t); }
    for (var p = 0; p < plots.length; p++) {
      var plot = plots[p], trt = ptm[plot], trtS = trt != null ? "_Trt" + trt : "";
      queue.push({
        rep: repNum, plot: plot, treatment: trt != null ? trt : null,
        side: nfb ? "Front" : null,
        fileName: nfb ? tn+"_Rep"+repNum+"_Plot"+plot+trtS+"_Front.jpg" : tn+"_Rep"+repNum+"_Plot"+plot+trtS+".jpg",
        label: nfb ? "Plot "+plot+" — FRONT" : "Plot "+plot,
        trtLabel: trt != null ? "Treatment "+trt : null,
      });
    }
    if (nfb) {
      var rev = plots.slice().reverse();
      for (var p = 0; p < rev.length; p++) {
        var plot = rev[p], trt = ptm[plot], trtS = trt != null ? "_Trt" + trt : "";
        queue.push({
          rep: repNum, plot: plot, treatment: trt != null ? trt : null, side: "Back",
          fileName: tn+"_Rep"+repNum+"_Plot"+plot+trtS+"_Back.jpg",
          label: "Plot "+plot+" — BACK",
          trtLabel: trt != null ? "Treatment "+trt : null,
        });
      }
    }
  }
  return queue;
}

function speakLabel(text) {
  if ("speechSynthesis" in window) {
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.rate = 1.1; u.pitch = 1;
    window.speechSynthesis.speak(u);
  }
}

function dataUrlToFile(dataUrl, fileName) {
  var arr = dataUrl.split(","), mime = arr[0].match(/:(.*?);/)[1];
  var bstr = atob(arr[1]), n = bstr.length, u8 = new Uint8Array(n);
  while (n--) u8[n] = bstr.charCodeAt(n);
  return new File([u8], fileName, { type: mime });
}

function downloadPhoto(photo) {
  var a = document.createElement("a");
  a.href = photo.dataUrl; a.download = photo.fileName; a.click();
}

// ─── MAIN APP ────────────────────────────────────────────────────────
function PhotoBoothApp() {
  var _s = useState(STEPS.HOME), step = _s[0], setStep = _s[1];
  var _c = useState({
    trialNumber: "", totalReps: 3, totalTreatments: 10, selectedReps: [],
    needFrontBack: false, directions: {}, plotTreatmentMap: {}, armLoaded: false, saveMethod: "auto",
  }), config = _c[0], setConfig = _c[1];
  var _q = useState([]), shootingQueue = _q[0], setShootingQueue = _q[1];
  var _ci = useState(0), currentIndex = _ci[0], setCurrentIndex = _ci[1];
  var _ph = useState([]), photos = _ph[0], setPhotos = _ph[1];
  var _sk = useState([]), skippedPlots = _sk[0], setSkippedPlots = _sk[1];
  var _n = useState({}), notes = _n[0], setNotes = _n[1];
  var _sl = useState(true), showingLabel = _sl[0], setShowingLabel = _sl[1];
  var _ds = useState(0), dirStep = _ds[0], setDirStep = _ds[1];
  var _sn = useState(false), showNoteInput = _sn[0], setShowNoteInput = _sn[1];
  var _cn = useState(""), currentNote = _cn[0], setCurrentNote = _cn[1];
  var _at = useState(""), armText = _at[0], setArmText = _at[1];
  var _ap = useState(null), armParseStatus = _ap[0], setArmParseStatus = _ap[1];
  var _pl = useState(false), pdfLoading = _pl[0], setPdfLoading = _pl[1];
  var _rm = useState(false), retakeMode = _rm[0], setRetakeMode = _rm[1];
  var _fh = useState(null), folderHandle = _fh[0], setFolderHandle = _fh[1];
  var _sc = useState({ hasFileSystemAccess: false, hasShareFiles: false, isIOS: false });
  var saveCapabilities = _sc[0], setSaveCapabilities = _sc[1];
  var _sf = useState(null), saveFeedback = _sf[0], setSaveFeedback = _sf[1];
  var fileInputRef = useRef(null), pdfInputRef = useRef(null), noteInputRef = useRef(null);

  var currentShot = shootingQueue[currentIndex];
  var progress = shootingQueue.length > 0 ? (currentIndex / shootingQueue.length) * 100 : 0;

  useEffect(function() { setSaveCapabilities(detectSaveCapabilities()); }, []);

  useEffect(function() {
    if (step === STEPS.SHOOTING && showingLabel && currentShot && !showNoteInput && !retakeMode) {
      var label = currentShot.trtLabel ? currentShot.label + ", " + currentShot.trtLabel : currentShot.label;
      var timer = setTimeout(function() { speakLabel(label); }, 300);
      return function() { clearTimeout(timer); };
    }
  }, [step, currentIndex, showingLabel, currentShot, showNoteInput, retakeMode]);

  useEffect(function() {
    if (showNoteInput && noteInputRef.current) noteInputRef.current.focus();
  }, [showNoteInput]);

  // Save functions
  var saveToFolder = useCallback(function(photo) {
    if (!folderHandle) return Promise.resolve(false);
    return folderHandle.getFileHandle(photo.fileName, { create: true })
      .then(function(fh) { return fh.createWritable(); })
      .then(function(w) {
        var file = dataUrlToFile(photo.dataUrl, photo.fileName);
        return w.write(file).then(function() { return w.close(); });
      })
      .then(function() { return true; })
      .catch(function(e) { console.error(e); return false; });
  }, [folderHandle]);

  var saveViaShare = useCallback(function(photo) {
    var file = dataUrlToFile(photo.dataUrl, photo.fileName);
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      return navigator.share({ files: [file], title: photo.fileName })
        .then(function() { return true; })
        .catch(function(e) { return e.name === "AbortError" ? true : false; });
    }
    return Promise.resolve(false);
  }, []);

  var saveViaDownload = useCallback(function(photo) {
    downloadPhoto(photo); return true;
  }, []);

  var savePhoto = useCallback(function(photo) {
    var method = config.saveMethod;
    var p;
    if (method === "folder" && folderHandle) p = saveToFolder(photo);
    else if (method === "share") p = saveViaShare(photo);
    else p = Promise.resolve(saveViaDownload(photo));
    return Promise.resolve(p).then(function(ok) {
      if (!ok) saveViaDownload(photo);
      setSaveFeedback({ type: "success", message: "Saved!" });
      setTimeout(function() { setSaveFeedback(null); }, 1500);
      return ok;
    });
  }, [config.saveMethod, folderHandle, saveToFolder, saveViaShare, saveViaDownload]);

  var pickFolder = function() {
    return window.showDirectoryPicker({ mode: "readwrite" })
      .then(function(handle) {
        setFolderHandle(handle);
        setConfig(function(p) { return Object.assign({}, p, { saveMethod: "folder" }); });
        return handle.name;
      })
      .catch(function() { return null; });
  };

  // PDF upload
  var handlePDFUpload = function(e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    setPdfLoading(true); setArmParseStatus(null);
    file.arrayBuffer().then(function(ab) {
      if (window.pdfjsLib) {
        return pdfjsLib.getDocument({ data: ab }).promise.then(function(pdf) {
          var texts = [];
          var getPage = function(i) {
            if (i > pdf.numPages) return Promise.resolve(texts.join("\n"));
            return pdf.getPage(i).then(function(page) {
              return page.getTextContent();
            }).then(function(content) {
              texts.push(content.items.map(function(it) { return it.str; }).join(" "));
              return getPage(i + 1);
            });
          };
          return getPage(1);
        }).then(function(fullText) {
          var mapping = parseARMText(fullText);
          var count = Object.keys(mapping).length;
          if (count > 0) {
            setConfig(function(p) { return Object.assign({}, p, { plotTreatmentMap: mapping, armLoaded: true }); });
            setArmParseStatus({
              success: true, message: "Found " + count + " plot→treatment mappings",
              sample: Object.entries(mapping).slice(0, 6).map(function(e) { return "Plot " + e[0] + " → Trt " + e[1]; }).join(", "),
            });
          } else {
            setArmParseStatus({ success: false, message: "Could not auto-detect mappings. Try manual entry." });
          }
        });
      } else {
        setArmParseStatus({ success: false, message: "PDF library not loaded. Use manual entry." });
      }
    }).catch(function(err) {
      setArmParseStatus({ success: false, message: "Error: " + err.message });
    }).finally(function() {
      setPdfLoading(false);
      e.target.value = "";
    });
  };

  var handleManualParse = function() {
    var mapping = parseManualEntry(armText);
    var count = Object.keys(mapping).length;
    if (count > 0) {
      setConfig(function(p) { return Object.assign({}, p, { plotTreatmentMap: mapping, armLoaded: true }); });
      setArmParseStatus({
        success: true, message: "Parsed " + count + " mappings",
        sample: Object.entries(mapping).slice(0, 6).map(function(e) { return "Plot " + e[0] + " → Trt " + e[1]; }).join(", "),
      });
    } else {
      setArmParseStatus({ success: false, message: "Could not parse. Check format." });
    }
  };

  // Shooting logic
  var advanceToNext = useCallback(function() {
    if (currentIndex + 1 < shootingQueue.length) {
      setCurrentIndex(function(p) { return p + 1; });
      setShowingLabel(true); setShowNoteInput(false); setCurrentNote(""); setRetakeMode(false);
    } else {
      setStep(STEPS.REVIEW);
    }
  }, [currentIndex, shootingQueue.length]);

  var handlePhotoCapture = useCallback(function(e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      var newPhoto = {
        dataUrl: ev.target.result, fileName: currentShot.fileName, label: currentShot.label,
        rep: currentShot.rep, plot: currentShot.plot, side: currentShot.side,
        treatment: currentShot.treatment, index: currentIndex,
      };
      if (retakeMode) {
        setPhotos(function(prev) { return prev.map(function(p) { return p.index === currentIndex ? newPhoto : p; }); });
        setRetakeMode(false);
      } else {
        setPhotos(function(prev) { return prev.concat([newPhoto]); });
      }
      if (config.saveMethod === "folder" && folderHandle) {
        savePhoto(newPhoto);
      }
      setShowNoteInput(true);
    };
    reader.readAsDataURL(file);
    e.target.value = "";
  }, [currentShot, currentIndex, config.saveMethod, folderHandle, retakeMode, savePhoto]);

  var saveNoteAndAdvance = function() {
    if (currentNote.trim()) {
      setNotes(function(p) { var n = Object.assign({}, p); n[currentIndex] = currentNote.trim(); return n; });
    }
    advanceToNext();
  };

  var skipPlot = function() {
    setSkippedPlots(function(p) { return p.concat([currentIndex]); });
    advanceToNext();
  };

  var startShooting = function() {
    var queue = buildShootingQueue(config);
    setShootingQueue(queue); setCurrentIndex(0); setPhotos([]); setSkippedPlots([]);
    setNotes({}); setShowingLabel(true); setShowNoteInput(false); setCurrentNote(""); setRetakeMode(false);
    setStep(STEPS.SHOOTING);
  };

  var saveAllRemaining = function() {
    var delay = 0;
    photos.forEach(function(photo) {
      setTimeout(function() { savePhoto(photo); }, delay);
      delay += 300;
    });
    var noteKeys = Object.keys(notes);
    if (noteKeys.length > 0) {
      setTimeout(function() {
        var rows = ["Plot,Rep,Treatment,Side,Note,FileName"];
        noteKeys.forEach(function(idx) {
          var shot = shootingQueue[parseInt(idx)];
          if (shot) rows.push(shot.plot+","+shot.rep+","+(shot.treatment||"")+","+(shot.side||"")+","+JSON.stringify(notes[idx])+","+shot.fileName);
        });
        var blob = new Blob([rows.join("\n")], { type: "text/csv" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url; a.download = config.trialNumber + "_notes.csv"; a.click();
        URL.revokeObjectURL(url);
      }, delay + 200);
    }
    setTimeout(function() { setStep(STEPS.COMPLETE); }, delay + 800);
  };

  var resetApp = function() {
    setStep(STEPS.HOME);
    setConfig({
      trialNumber: "", totalReps: 3, totalTreatments: 10, selectedReps: [],
      needFrontBack: false, directions: {}, plotTreatmentMap: {}, armLoaded: false,
      saveMethod: config.saveMethod,
    });
    setShootingQueue([]); setCurrentIndex(0); setPhotos([]); setSkippedPlots([]);
    setNotes({}); setShowingLabel(true); setShowNoteInput(false); setCurrentNote("");
    setDirStep(0); setArmText(""); setArmParseStatus(null); setRetakeMode(false);
  };

  var toggleRep = function(rep) {
    setConfig(function(prev) {
      var sel = prev.selectedReps.indexOf(rep) >= 0
        ? prev.selectedReps.filter(function(r) { return r !== rep; })
        : prev.selectedReps.concat([rep]).sort(function(a,b) { return a-b; });
      return Object.assign({}, prev, { selectedReps: sel });
    });
  };

  // ─── STYLES ────────────────────────────────────────────────────────
  var S = {
    page: {
      minHeight: "100vh", background: "linear-gradient(145deg, #0a1628 0%, #12233d 50%, #0d1a2e 100%)",

      display: "flex", flexDirection: "column", alignItems: "center", padding: "24px 16px", boxSizing: "border-box",
    },
    card: {
      background: "rgba(255,255,255,0.06)", backdropFilter: "blur(20px)", borderRadius: "20px",
      border: "1px solid rgba(255,255,255,0.1)", padding: "28px 24px", width: "100%", maxWidth: "420px", boxSizing: "border-box",
    },
    btnP: {
      width: "100%", padding: "18px 24px", borderRadius: "14px", border: "none",
      background: "linear-gradient(135deg,#2563eb,#1d4ed8)", color: "white", fontSize: "18px",
      fontWeight: "700", cursor: "pointer", boxShadow: "0 4px 20px rgba(37,99,235,0.35)",
    },
    btnS: {
      width: "100%", padding: "18px 24px", borderRadius: "14px",
      background: "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.2)",
      color: "white", fontSize: "18px", fontWeight: "700", cursor: "pointer",
    },
    btnG: {
      width: "100%", padding: "18px 24px", borderRadius: "14px", border: "none",
      background: "linear-gradient(135deg,#16a34a,#15803d)", color: "white", fontSize: "18px",
      fontWeight: "700", cursor: "pointer", boxShadow: "0 4px 20px rgba(22,163,74,0.35)",
    },
    btnW: {
      width: "100%", padding: "18px 24px", borderRadius: "14px", border: "none",
      background: "linear-gradient(135deg,#d97706,#b45309)", color: "white", fontSize: "18px",
      fontWeight: "700", cursor: "pointer",
    },
    btnD: {

  // ─── RENDER ────────────────────────────────────────────────────────

  // HOME
  if (step === STEPS.HOME) {
    return h("div", { style: S.page },
      h("div", { style: { textAlign: "center", marginTop: "60px", marginBottom: "40px" } },
        h("div", { style: {

        h("div", { style: { fontSize: "56px", fontWeight: "900", letterSpacing: "-1px", lineHeight: "1.1", marginBottom: "8px" } },
          "Plot " + currentShot.plot),

        currentShot.side ? h("div", { style: {
          display: "inline-block", margin: "0 auto", padding: "6px 24px", borderRadius: "100px",
          background: currentShot.side === "Front" ? "rgba(37,99,235,0.2)" : "rgba(234,179,8,0.2)",
          color: currentShot.side === "Front" ? "#93bbfc" : "#fbbf24",
          fontSize: "20px", fontWeight: "700", letterSpacing: "2px", textTransform: "uppercase",
        } }, currentShot.side) : null,

        currentShot.trtLabel ? h("div", { style: {
          marginTop: "12px", padding: "6px 18px", borderRadius: "100px",
          display: "inline-block", background: "rgba(124,58,237,0.15)",
          border: "1px solid rgba(124,58,237,0.3)", color: "#c4b5fd",
          fontSize: "16px", fontWeight: "600", margin: "12px auto 0",
        } }, currentShot.trtLabel) : null,

        h("p", { style: { fontSize: "12px", color: "rgba(255,255,255,0.25)", marginTop: "16px", fontFamily: "monospace" } },
          currentShot.fileName)
      ),

      // Bottom buttons
      h("div", { style: { width: "100%", maxWidth: "420px" } },
        h("input", { ref: fileInputRef, type: "file", accept: "image/*", capture: "environment",
          onChange: handlePhotoCapture, style: { display: "none" } }),
        h("button", {
          style: Object.assign({}, S.btnG, { padding: "22px", fontSize: "20px",
            boxShadow: "0 6px 28px rgba(22,163,74,0.4)", marginBottom: "10px" }),
          onClick: function() { fileInputRef.current && fileInputRef.current.click(); }
        }, "📷 " + (retakeMode ? "Retake Photo" : "Take Photo")),

        h("div", { style: { display: "flex", gap: "10px", marginBottom: "10px" } },
          h("button", {
            style: Object.assign({}, S.btnW, { flex: 1, padding: "14px", fontSize: "14px" }),
            onClick: function() { if (window.confirm("Skip Plot " + currentShot.plot + "?")) skipPlot(); }
          }, "Skip Plot"),
          retakeMode ? h("button", {
            style: Object.assign({}, S.btnS, { flex: 1, padding: "14px", fontSize: "14px" }),
            onClick: function() { setRetakeMode(false); setShowNoteInput(true); }
          }, "Cancel Retake") : null
        ),

        h("button", {
          style: Object.assign({}, S.btnS, { padding: "12px", fontSize: "13px", color: "rgba(255,255,255,0.35)" }),
          onClick: function() {
            if (window.confirm("Stop shooting?")) {
              if (photos.length > 0) setStep(STEPS.REVIEW); else setStep(STEPS.COMPLETE);
            }
          }
        }, "Stop Early")
      )
    );
  }

  // REVIEW
  if (step === STEPS.REVIEW) {
    var noteCount = Object.keys(notes).length;
    var needsSave = config.saveMethod !== "folder";
    return h("div", { style: S.page }, h("div", { style: Object.assign({}, S.card, { maxWidth: "500px" }) },
      h("h2", { style: S.title }, "Review & Save"),
      h("p", { style: S.sub },
        photos.length + " photos" +
        (skippedPlots.length > 0 ? ", " + skippedPlots.length + " skipped" : "") +
        (noteCount > 0 ? ", " + noteCount + " notes" : "") +
        (config.saveMethod === "folder" && folderHandle ? " — saved to " + folderHandle.name : "")),

      h("div", { style: { maxHeight: "400px", overflowY: "auto", marginBottom: "20px" } },
        photos.map(function(photo, i) {
          var noteText = notes[photo.index];
          return h("div", { key: i, style: {
            display: "flex", alignItems: "center", gap: "12px", padding: "10px",
            borderBottom: "1px solid rgba(255,255,255,0.06)",
          } },
            h("img", { src: photo.dataUrl, alt: photo.label,
              style: { width: "56px", height: "56px", borderRadius: "8px", objectFit: "cover" } }),
            h("div", { style: { flex: 1 } },
              h("div", { style: { fontSize: "14px", fontWeight: "600" } }, photo.label),
              photo.treatment != null ? h("div", { style: { fontSize: "11px", color: "#c4b5fd" } }, "Treatment " + photo.treatment) : null,
              h("div", { style: { fontSize: "11px", color: "rgba(255,255,255,0.35)", fontFamily: "monospace" } }, photo.fileName),
              noteText ? h("div", { style: { fontSize: "11px", color: "#fbbf24", marginTop: "2px" } }, "📝 " + noteText) : null
            ),
            needsSave ? h("button", {
              onClick: function() { savePhoto(photo); },
              style: {
                padding: "8px 12px", borderRadius: "8px",
                border: "1px solid rgba(255,255,255,0.15)", background: "rgba(255,255,255,0.05)",
                color: "#93bbfc", fontSize: "12px", fontWeight: "600", cursor: "pointer",
              }
            }, "Save") : null
          );
        })
      ),

      needsSave
        ? h("button", { style: S.btnG, onClick: saveAllRemaining },
            config.saveMethod === "share" ? "Save All via Share Sheet" :
            "Download All (" + photos.length + " Photos" + (noteCount > 0 ? " + Notes" : "") + ")")
        : h("div", { style: {
            background: "rgba(22,163,74,0.12)", borderRadius: "12px", padding: "14px",
            marginBottom: "12px", textAlign: "center", border: "1px solid rgba(22,163,74,0.25)",
          } }, h("p", { style: { margin: 0, fontSize: "15px", color: "#4ade80", fontWeight: "600" } },
            "✓ All photos saved to " + (folderHandle ? folderHandle.name : "folder"))),

      h("button", { style: Object.assign({}, S.btnP, { marginTop: "12px" }),
        onClick: function() { setStep(STEPS.COMPLETE); } }, "Done")
    ));
  }

  // COMPLETE
  if (step === STEPS.COMPLETE) {
    var noteCount = Object.keys(notes).length;
    return h("div", { style: S.page },
      h("div", { style: { textAlign: "center", marginTop: "80px", marginBottom: "40px" } },
        h("div", { style: {
          width: "80px", height: "80px", borderRadius: "50%",
          background: "linear-gradient(135deg,#16a34a,#22c55e)",
          display: "flex", alignItems: "center", justifyContent: "center",
          margin: "0 auto 24px", fontSize: "36px", boxShadow: "0 8px 32px rgba(22,163,74,0.3)",
        } }, "✓"),
        h("h2", { style: Object.assign({}, S.title, { fontSize: "30px" }) }, "All Done!"),
        h("p", { style: S.sub }, photos.length + " photos for " + config.trialNumber +
          (skippedPlots.length > 0 ? " (" + skippedPlots.length + " skipped)" : "")),
        noteCount > 0 ? h("p", { style: { fontSize: "14px", color: "#fbbf24", marginTop: "-20px" } }, "📝 " + noteCount + " notes") : null,
        folderHandle ? h("p", { style: { fontSize: "14px", color: "#4ade80", marginTop: "-12px" } }, "📁 Saved to " + folderHandle.name) : null
      ),
      h("div", { style: S.card },
        h("button", { style: S.btnP, onClick: resetApp }, "Start New Session"),
        folderHandle ? h("p", { style: { fontSize: "12px", color: "rgba(255,255,255,0.3)", textAlign: "center", marginTop: "12px", marginBottom: 0 } },
          "Save folder remembered for next session") : null
      )
    );
  }

  return null;
}

ReactDOM.render(
  React.createElement(PhotoBoothApp),
  document.getElementById("root")
);
</script>
</body>
</html>
